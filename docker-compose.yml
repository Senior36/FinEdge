services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: finedge-postgres
    environment:
      POSTGRES_USER: finedge
      POSTGRES_PASSWORD: finedge_password
      POSTGRES_DB: stockanalytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finedge -d stockanalytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finedge-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finedge-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://finedge:finedge_password@postgres:5432/stockanalytics
      NEWS_API_KEY: ${NEWS_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      LLM_MODEL: google/gemini-3-flash-preview
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - finedge-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finedge-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - finedge-network

volumes:
  postgres_data:
    driver: local

networks:
  finedge-network:
    driver: bridge
