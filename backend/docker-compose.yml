services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finedge
      POSTGRES_PASSWORD: finedge_password
      POSTGRES_DB: stockanalytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - ../fundamental_model/outputs:/artifacts/fundamental:ro
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://finedge:finedge_password@postgres:5432/stockanalytics
      NEWS_API_KEY: ${NEWS_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      EODHD_API_KEY: ${EODHD_API_KEY:-}
      FUNDAMENTAL_ARTIFACT_DIR: /artifacts/fundamental
      FUNDAMENTAL_REQUIRE_MODEL_SIGNAL: "true"
    depends_on:
      - postgres

volumes:
  postgres_data:
